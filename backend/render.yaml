services:
  - type: web
    name: hospital-booking-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn django_tutorial.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
